services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: kraft
      POSTGRES_USER: kraft
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kraft -d kraft"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build: .
    ports:
      - "3007:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://kraft:${DB_PASSWORD}@db:5432/kraft
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      OWNER_EMAIL: ${OWNER_EMAIL:?OWNER_EMAIL is required}
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  uploads:
